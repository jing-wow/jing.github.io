<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日拼图 · 本地版</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  h1 {
    margin-bottom: 5px;
    font-size: 24px;
  }
  .controls {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .mode-buttons {
    display: flex;
    gap: 5px;
  }
  .mode-buttons button {
    padding: 6px 12px;
    border: 1px solid #ccc;
    background: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
  }
  .mode-buttons button.active {
    background: black;
    color: white;
    border-color: black;
  }
  #streak {
    font-weight: bold;
    color: #4caf50;
    font-size: 20px;
  }
  #puzzle {
    display: grid;
    gap: 8px;
    justify-content: center;
    margin: 25px 0;
    user-select: none;
  }
  .block {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    cursor: pointer;
    touch-action: manipulation;
  }
  .block-content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #ddd;
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    transition: filter 0.2s;
  }
  .block-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 13px;
    font-weight: bold;
    text-shadow: 0 0 4px black;
    z-index: 2;
    width: 90%;
    text-align: center;
    word-break: break-word;
    pointer-events: none;
  }
  .block-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(2px);
    z-index: 1;
    transition: opacity 0.2s;
    border-radius: 8px;
    pointer-events: none;
  }
  .block.done .block-overlay {
    opacity: 0;
  }
  .block.done .block-content {
    background-color: #4caf50 !important;
  }
  .footer {
    margin-top: 30px;
    color: #888;
    font-size: 14px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }
  .footer button, .footer .custom-link {
    background: #e0e0e0;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    color: #333;
    font-weight: 500;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  .footer button:active, .footer .custom-link:active {
    background: #ccc;
  }
  .image-upload {
    margin: 15px 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .image-upload label {
    background: #eee;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
  }
  .image-upload input {
    display: none;
  }
  .image-upload button {
    background: none;
    border: 1px solid #ccc;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
  }
  .summary-section {
    margin: 20px 0;
    text-align: left;
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .summary-section textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 5px;
    resize: vertical;
  }
  .summary-section button {
    margin-top: 10px;
    padding: 8px 16px;
    background: #4caf50;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }
  .settings-panel, .stats-panel {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    padding: 20px;
    z-index: 1000;
    text-align: left;
  }
  .stats-panel {
    display: none;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .panel-header h3 {
    margin: 0;
  }
  .close-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #888;
  }
  .settings-panel textarea {
    width: 100%;
    box-sizing: border-box;
    margin: 5px 0 15px;
    padding: 8px;
    font-family: monospace;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .settings-panel label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }
  .stats-panel .stat-item {
    margin-bottom: 15px;
  }
  .stats-panel table {
    width: 100%;
    border-collapse: collapse;
  }
  .stats-panel td, .stats-panel th {
    padding: 8px;
    border-bottom: 1px solid #eee;
    text-align: left;
  }
  .stats-panel th {
    font-weight: 600;
  }
  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 999;
  }
  #pickerOverlay {
    display: none;
    position: fixed;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 15px rgba(0,0,0,0.2);
    padding: 10px 0;
    z-index: 1001;
    max-width: 80%;
    max-height: 60%;
    overflow-y: auto;
  }
  #pickerOverlay ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  #pickerOverlay li {
    padding: 12px 20px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
  }
  #pickerOverlay li:last-child {
    border-bottom: none;
  }
  #pickerOverlay li:hover {
    background: #f0f0f0;
  }
  .hint {
    font-size: 12px;
    color: #999;
    margin-top: 10px;
  }
</style>
</head>
<body>

<h1>🧩 每日拼图</h1>
<p id="date"></p>

<div class="controls">
  <div class="mode-buttons">
    <button id="mode3" onclick="setMode(3)">3块</button>
    <button id="mode4" onclick="setMode(4)">4块</button>
    <button id="mode5" onclick="setMode(5)">5块</button>
    <button id="mode6" onclick="setMode(6)">6块</button>
  </div>
  <div>连续完成 <span id="streak">0</span> 天</div>
</div>

<div id="puzzle"></div>

<!-- 今日一句区域 -->
<div class="summary-section">
  <label for="todaySummary">📝 今日一句</label>
  <textarea id="todaySummary" rows="2" placeholder="写下今天的心情或收获..."></textarea>
  <button onclick="saveTodaySummary()">保存</button>
  <span id="summarySaved" style="margin-left: 10px; color: green; display: none;">✓ 已保存</span>
</div>

<div class="image-upload">
  <label for="imageUpload">📷 上传背景图</label>
  <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
  <button onclick="clearImage()">清除图片</button>
</div>

<div class="footer">
  <span class="custom-link" onclick="toggleSettings()">⚙️ 自定义模块</span>
  <span class="custom-link" onclick="showStats()">📊 统计回顾</span>
</div>

<!-- 自定义模块面板 -->
<div id="settingsPanel" class="settings-panel">
  <div class="panel-header">
    <h3>自定义模块库</h3>
    <button class="close-btn" onclick="toggleSettings()">&times;</button>
  </div>
  <label>基础模块（每行一项）</label>
  <textarea id="baseModulesInput" rows="4" placeholder="健康复利：运动至少30分钟&#10;关系复利：深度链接一个人&#10;成长复利：自我觉察及输出&#10;财富复利：主被动收入推进"></textarea>
  <label>主题池（每行一项）</label>
  <textarea id="themePoolInput" rows="5" placeholder="输出300字&#10;AI学习20分钟&#10;联系一个人&#10;阅读30分钟&#10;10分钟静坐"></textarea>
  <div>
    <button onclick="saveCustomModules()">保存并重新生成</button>
  </div>
  <p class="hint">保存后会清空今天进度，按当前块数重新生成初始拼块。</p>
</div>

<!-- 统计回顾面板 -->
<div id="statsPanel" class="stats-panel">
  <div class="panel-header">
    <h3>📊 统计回顾</h3>
    <button class="close-btn" onclick="hideStats()">&times;</button>
  </div>
  <div id="statsContent">加载中...</div>
</div>

<!-- 遮罩层 -->
<div id="overlay" class="overlay" onclick="hideAllPanels()"></div>

<!-- 长按编辑浮层 -->
<div id="pickerOverlay" onclick="event.stopPropagation()">
  <ul id="pickerOptions"></ul>
</div>

<script>
// ----- 默认配置（已更新为你指定的内容）-----
const DEFAULT_BASE = [
  "健康复利：运动至少30分钟",
  "关系复利：深度链接一个人",
  "成长复利：自我觉察及输出",
  "财富复利：主被动收入推进"
];
const DEFAULT_THEME = [
  "输出300字",
  "AI学习20分钟",
  "联系一个人",
  "阅读30分钟",
  "10分钟静坐",
  "早睡30分钟"
];

// ----- 全局变量 -----
let uploadedImageDataURL = null;
let currentEditingIndex = -1;

// ----- 数据迁移：将旧版数据转换为新版统一格式 -----
function migrateDayData(dateStr) {
  const oldPuzzleKey = "puzzle_" + dateStr;
  const oldData = localStorage.getItem(oldPuzzleKey);
  if (!oldData) return null; // 无旧数据

  const pieces = JSON.parse(oldData);
  const done = [];
  for (let i = 0; i < pieces.length; i++) {
    const doneKey = oldPuzzleKey + "_done_" + i;
    done.push(localStorage.getItem(doneKey) === 'true');
  }
  const oldSummaryKey = oldPuzzleKey + "_summary";
  const summary = localStorage.getItem(oldSummaryKey) || '';

  const newData = { pieces, done, summary };
  const newKey = "puzzleData_" + dateStr;
  localStorage.setItem(newKey, JSON.stringify(newData));

  // 清理旧键
  localStorage.removeItem(oldPuzzleKey);
  for (let i = 0; i < pieces.length; i++) {
    localStorage.removeItem(oldPuzzleKey + "_done_" + i);
  }
  localStorage.removeItem(oldSummaryKey);

  return newData;
}

// 获取某天的数据（返回对象，如果不存在则创建默认）
function getDayData(dateStr) {
  const newKey = "puzzleData_" + dateStr;
  let dataStr = localStorage.getItem(newKey);
  if (dataStr) {
    return JSON.parse(dataStr);
  }
  // 尝试迁移旧数据
  const migrated = migrateDayData(dateStr);
  if (migrated) return migrated;

  // 否则返回 null（当天无数据）
  return null;
}

// 保存当天数据（pieces, done, summary）
function saveDayData(dateStr, data) {
  const newKey = "puzzleData_" + dateStr;
  localStorage.setItem(newKey, JSON.stringify(data));
  // 清理可能残留的旧键（安全）
  localStorage.removeItem("puzzle_" + dateStr);
  for (let i = 0; i < data.pieces.length; i++) {
    localStorage.removeItem("puzzle_" + dateStr + "_done_" + i);
  }
  localStorage.removeItem("puzzle_" + dateStr + "_summary");
}

// 获取今天的日期字符串 YYYY-MM-DD
function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

// ----- 读取/保存自定义模块 -----
function loadCustomModules() {
  let base = localStorage.getItem('custom_baseModules');
  let theme = localStorage.getItem('custom_themePool');
  if (!base) base = DEFAULT_BASE;
  else try { base = JSON.parse(base); } catch { base = DEFAULT_BASE; }
  if (!theme) theme = DEFAULT_THEME;
  else try { theme = JSON.parse(theme); } catch { theme = DEFAULT_THEME; }
  return { base, theme };
}

function saveCustomModulesFromInputs() {
  const baseText = document.getElementById('baseModulesInput').value.trim();
  const themeText = document.getElementById('themePoolInput').value.trim();
  const baseArray = baseText.split('\n').map(s => s.trim()).filter(s => s !== '');
  const themeArray = themeText.split('\n').map(s => s.trim()).filter(s => s !== '');
  if (baseArray.length === 0) { alert('基础模块不能为空'); return false; }
  if (themeArray.length === 0) { alert('主题池至少需要一项'); return false; }
  localStorage.setItem('custom_baseModules', JSON.stringify(baseArray));
  localStorage.setItem('custom_themePool', JSON.stringify(themeArray));
  return true;
}

function loadSettingsToInputs() {
  const { base, theme } = loadCustomModules();
  document.getElementById('baseModulesInput').value = base.join('\n');
  document.getElementById('themePoolInput').value = theme.join('\n');
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('overlay');
  if (panel.style.display === 'none' || panel.style.display === '') {
    panel.style.display = 'block';
    overlay.style.display = 'block';
    loadSettingsToInputs();
  } else {
    panel.style.display = 'none';
    overlay.style.display = 'none';
  }
}

function saveCustomModules() {
  if (!saveCustomModulesFromInputs()) return;
  // 清空当天记录，重新生成
  const todayStr = getTodayStr();
  localStorage.removeItem("puzzleData_" + todayStr);
  toggleSettings(); // 关闭面板
  const savedMode = localStorage.getItem("puzzle_mode_" + todayStr);
  const mode = savedMode ? parseInt(savedMode) : 5;
  generatePuzzle(mode);
}

// ----- 更新连续完成天数（基于本地数据）-----
function updateStreak() {
  let streak = 0;
  let currentDate = new Date();

  while (true) {
    const dateStr = currentDate.toISOString().split('T')[0];
    const dayData = getDayData(dateStr);
    if (!dayData) break; // 没有这一天

    const allDone = dayData.done.every(v => v === true);
    if (!allDone) break;

    streak++;
    currentDate.setDate(currentDate.getDate() - 1);
  }
  document.getElementById('streak').innerText = streak;
}

// ----- 根据块数获取网格行列数 -----
function getGridRowsCols(pieceCount) {
  if (pieceCount <= 3) return { rows: 1, cols: 3 };
  if (pieceCount === 4) return { rows: 2, cols: 2 };
  return { rows: 2, cols: 3 };
}

// ----- 显示编辑浮层 -----
function showPickerForBlock(index, blockElement, clientX, clientY) {
  const { base, theme } = loadCustomModules();
  const allOptions = [...new Set([...base, ...theme])];
  const list = document.getElementById('pickerOptions');
  list.innerHTML = '';
  allOptions.forEach(opt => {
    const li = document.createElement('li');
    li.textContent = opt;
    li.onclick = (e) => {
      e.stopPropagation();
      const todayStr = getTodayStr();
      const dayData = getDayData(todayStr);
      if (!dayData) return;
      if (index < dayData.pieces.length) {
        dayData.pieces[index] = opt;
        dayData.done[index] = false; // 重置完成状态
        saveDayData(todayStr, dayData);
        renderPuzzle(dayData.pieces, dayData.done);
        updateStreak();
        document.getElementById('todaySummary').value = dayData.summary || '';
      }
      hidePicker();
    };
    list.appendChild(li);
  });

  const overlay = document.getElementById('pickerOverlay');
  let left, top;
  if (clientX !== undefined && clientY !== undefined) {
    left = clientX + window.scrollX;
    top = clientY + window.scrollY + 5;
  } else {
    const rect = blockElement.getBoundingClientRect();
    left = rect.left + window.scrollX;
    top = rect.bottom + window.scrollY + 5;
  }
  overlay.style.left = Math.min(left, window.innerWidth - 200) + 'px';
  overlay.style.top = top + 'px';
  overlay.style.display = 'block';
}

function hidePicker() {
  document.getElementById('pickerOverlay').style.display = 'none';
}

// ----- 渲染拼图块（传入pieces和done数组）-----
function renderPuzzle(pieces, done) {
  const container = document.getElementById('puzzle');
  container.innerHTML = '';

  const pieceCount = pieces.length;
  const { rows, cols } = getGridRowsCols(pieceCount);
  container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  let bgSize = null;
  let bgPositions = [];
  if (uploadedImageDataURL) {
    bgSize = `${cols * 100}% ${rows * 100}%`;
    for (let i = 0; i < pieceCount; i++) {
      const r = Math.floor(i / cols);
      const c = i % cols;
      const xPercent = cols > 1 ? (c * 100 / (cols - 1)) + '%' : '0%';
      const yPercent = rows > 1 ? (r * 100 / (rows - 1)) + '%' : '0%';
      bgPositions[i] = `${xPercent} ${yPercent}`;
    }
  }

  pieces.forEach((piece, index) => {
    const block = document.createElement('div');
    block.className = 'block';
    block.dataset.index = index;

    const content = document.createElement('div');
    content.className = 'block-content';
    if (uploadedImageDataURL) {
      content.style.backgroundImage = `url(${uploadedImageDataURL})`;
      content.style.backgroundSize = bgSize;
      content.style.backgroundPosition = bgPositions[index];
    }

    const textSpan = document.createElement('div');
    textSpan.className = 'block-text';
    textSpan.innerText = piece;

    const overlay = document.createElement('div');
    overlay.className = 'block-overlay';

    block.appendChild(content);
    block.appendChild(textSpan);
    block.appendChild(overlay);

    if (done[index]) {
      block.classList.add('done');
    }

    // 触摸事件：单击切换完成，长按编辑
    let touchTimer;
    let touchMoved = false;
    const longPressDelay = 500;
    const moveThreshold = 10;

    block.addEventListener('touchstart', (e) => {
      e.preventDefault(); // 阻止默认滚动和菜单
      touchMoved = false;
      const touch = e.touches[0];
      const startX = touch.clientX;
      const startY = touch.clientY;

      touchTimer = setTimeout(() => {
        if (!touchMoved) {
          // 长按触发编辑
          showPickerForBlock(index, block, e.touches[0].clientX, e.touches[0].clientY);
        }
      }, longPressDelay);

      const touchMoveHandler = (e) => {
        if (!touchMoved) {
          const touch = e.touches[0];
          const dx = touch.clientX - startX;
          const dy = touch.clientY - startY;
          if (Math.abs(dx) > moveThreshold || Math.abs(dy) > moveThreshold) {
            touchMoved = true;
            clearTimeout(touchTimer);
          }
        }
      };

      const touchEndHandler = (e) => {
        clearTimeout(touchTimer);
        if (!touchMoved) {
          // 单击切换完成
          const todayStr = getTodayStr();
          const dayData = getDayData(todayStr);
          if (dayData) {
            dayData.done[index] = !dayData.done[index];
            saveDayData(todayStr, dayData);
            renderPuzzle(dayData.pieces, dayData.done);
            updateStreak();
          }
        }
        block.removeEventListener('touchmove', touchMoveHandler);
        block.removeEventListener('touchend', touchEndHandler);
        block.removeEventListener('touchcancel', touchEndHandler);
      };

      block.addEventListener('touchmove', touchMoveHandler, { passive: false });
      block.addEventListener('touchend', touchEndHandler);
      block.addEventListener('touchcancel', touchEndHandler);
    }, { passive: false });

    // 右键编辑（电脑）
    block.oncontextmenu = (e) => {
      e.preventDefault();
      e.stopPropagation();
      showPickerForBlock(index, block, e.clientX, e.clientY);
      return false;
    };

    container.appendChild(block);
  });

  document.getElementById('date').innerText = '日期：' + new Date().toLocaleDateString();
}

// ----- 生成今日拼图（mode 可选）-----
function generatePuzzle(mode) {
  const todayStr = getTodayStr();
  const { base, theme } = loadCustomModules();

  if (mode !== undefined) {
    // 删除当天数据
    localStorage.removeItem("puzzleData_" + todayStr);
    // 构造新拼图
    let pieces;
    if (mode === 3) {
      pieces = base.slice(0, 3);
    } else if (mode === 4) {
      pieces = base.slice(0, 4);
    } else if (mode === 5) {
      pieces = [...base.slice(0, 4), theme[0] || '（无主题）'];
    } else if (mode === 6) {
      const extra = theme.slice(0, 2);
      while (extra.length < 2) extra.push('额外任务');
      pieces = [...base.slice(0, 4), ...extra];
    } else {
      // 默认用5
      pieces = [...base.slice(0, 4), theme[0] || '（无主题）'];
      mode = 5;
    }
    const done = new Array(pieces.length).fill(false);
    const summary = '';
    saveDayData(todayStr, { pieces, done, summary });
    localStorage.setItem("puzzle_mode_" + todayStr, mode); // 保存模式

    renderPuzzle(pieces, done);
    updateModeUI(mode);
    updateStreak();
    document.getElementById('todaySummary').value = '';
    return;
  }

  // 无参数：检查当天数据
  let dayData = getDayData(todayStr);
  if (dayData) {
    const savedMode = localStorage.getItem("puzzle_mode_" + todayStr);
    const modeNum = savedMode ? parseInt(savedMode) : (dayData.pieces.length);
    renderPuzzle(dayData.pieces, dayData.done);
    updateModeUI(modeNum);
    updateStreak();
    document.getElementById('todaySummary').value = dayData.summary || '';
    return;
  }

  // 无当天数据：用默认模式生成（优先用上次保存的模式，否则5）
  const savedMode = localStorage.getItem("puzzle_mode_" + todayStr);
  const defaultMode = savedMode ? parseInt(savedMode) : 5;
  generatePuzzle(defaultMode);
}

function updateModeUI(mode) {
  ['mode3','mode4','mode5','mode6'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById('mode' + mode).classList.add('active');
}

function setMode(mode) {
  localStorage.setItem("puzzle_mode_" + getTodayStr(), mode);
  generatePuzzle(mode);
}

// ----- 今日一句保存 -----
function saveTodaySummary() {
  const summary = document.getElementById('todaySummary').value.trim();
  const todayStr = getTodayStr();
  let dayData = getDayData(todayStr);
  if (!dayData) {
    // 如果当天还没有数据，先按当前模式生成
    const mode = localStorage.getItem("puzzle_mode_" + todayStr) || 5;
    generatePuzzle(parseInt(mode));
    dayData = getDayData(todayStr);
  }
  dayData.summary = summary;
  saveDayData(todayStr, dayData);
  const savedSpan = document.getElementById('summarySaved');
  savedSpan.style.display = 'inline';
  setTimeout(() => { savedSpan.style.display = 'none'; }, 2000);
}

// ----- 统计回顾 -----
function showStats() {
  const panel = document.getElementById('statsPanel');
  const overlay = document.getElementById('overlay');
  panel.style.display = 'block';
  overlay.style.display = 'block';
  refreshStats();
}

function hideStats() {
  document.getElementById('statsPanel').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

function hideAllPanels() {
  document.getElementById('settingsPanel').style.display = 'none';
  document.getElementById('statsPanel').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  hidePicker();
}

function refreshStats() {
  const contentDiv = document.getElementById('statsContent');
  // 收集所有日期数据
  const dayDataMap = new Map(); // dateStr -> { pieces, done, summary }
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('puzzleData_')) {
      const dateStr = key.substring(11); // 去掉'puzzleData_'
      try {
        const data = JSON.parse(localStorage.getItem(key));
        dayDataMap.set(dateStr, data);
      } catch (e) {}
    }
  }

  // 按日期排序（最近在前）
  const sortedDates = Array.from(dayDataMap.keys()).sort().reverse();

  // 统计任务完成次数
  const taskStats = {}; // 任务名 -> { total: 出现次数, completed: 完成次数 }

  sortedDates.forEach(dateStr => {
    const data = dayDataMap.get(dateStr);
    data.pieces.forEach((task, idx) => {
      if (!taskStats[task]) {
        taskStats[task] = { total: 0, completed: 0 };
      }
      taskStats[task].total++;
      if (data.done[idx]) {
        taskStats[task].completed++;
      }
    });
  });

  // 构建HTML
  let html = '<div class="stat-item"><h4>📅 最近7天</h4>';
  const recentDates = sortedDates.slice(0, 7);
  if (recentDates.length === 0) {
    html += '<p>暂无数据</p>';
  } else {
    html += '<table><tr><th>日期</th><th>完成情况</th><th>今日一句</th></tr>';
    recentDates.forEach(dateStr => {
      const data = dayDataMap.get(dateStr);
      const doneCount = data.done.filter(v => v).length;
      const total = data.pieces.length;
      const summary = data.summary || '—';
      html += `<tr><td>${dateStr}</td><td>${doneCount}/${total}</td><td>${summary.substring(0, 20)}${summary.length>20?'…':''}</td></tr>`;
    });
    html += '</table>';
  }
  html += '</div>';

  html += '<div class="stat-item"><h4>📊 任务完成统计</h4>';
  if (Object.keys(taskStats).length === 0) {
    html += '<p>暂无任务</p>';
  } else {
    html += '<table><tr><th>任务</th><th>出现次数</th><th>完成次数</th><th>完成率</th></tr>';
    Object.entries(taskStats).sort((a,b) => b[1].total - a[1].total).forEach(([task, stat]) => {
      const rate = stat.total > 0 ? Math.round(stat.completed / stat.total * 100) : 0;
      html += `<tr><td>${task}</td><td>${stat.total}</td><td>${stat.completed}</td><td>${rate}%</td></tr>`;
    });
    html += '</table>';
  }
  html += '</div>';

  // 连续完成天数（已有）
  html += `<div class="stat-item"><h4>🔥 当前连续完成：${document.getElementById('streak').innerText} 天</h4></div>`;

  contentDiv.innerHTML = html;
}

// ----- 图片上传 -----
function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    uploadedImageDataURL = e.target.result;
    const todayStr = getTodayStr();
    const dayData = getDayData(todayStr);
    if (dayData) {
      renderPuzzle(dayData.pieces, dayData.done);
    } else {
      generatePuzzle();
    }
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearImage() {
  uploadedImageDataURL = null;
  const todayStr = getTodayStr();
  const dayData = getDayData(todayStr);
  if (dayData) {
    renderPuzzle(dayData.pieces, dayData.done);
  } else {
    generatePuzzle();
  }
}

// 点击外部隐藏浮层
document.addEventListener('click', function(e) {
  const overlay = document.getElementById('pickerOverlay');
  if (overlay.style.display === 'block' && !overlay.contains(e.target)) {
    overlay.style.display = 'none';
  }
});

// 启动
generatePuzzle();
</script>
